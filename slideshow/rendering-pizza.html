<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>How Google gets your website — pizza analogy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6ec;
    --card: #ffffff;
    --ink: #0a0a0a;
    --muted: #6b7280;
    --line: #e9e1d3;

    --good: #16a34a;
    --good-bg: #dcfce7;
    --warn: #d97706;
    --warn-bg: #fef3c7;
    --bad:  #dc2626;
    --bad-bg:  #fee2e2;

    --highlight: #fde68a;
  }

  html, body {
    height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3vh 3vw;
  }

  .frame {
    width: 100%;
    max-width: 1760px;
    aspect-ratio: 16 / 9;
    display: flex;
    flex-direction: column;
  }

  .head { text-align: center; margin-bottom: 32px; }
  .eyebrow {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  h1 {
    font-size: 54px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  h1 .mark {
    background: linear-gradient(180deg, transparent 60%, var(--highlight) 60%);
    padding: 0 8px;
  }

  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    min-height: 0;
    margin-bottom: 28px;
  }

  .card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 22px;
    padding: 28px 26px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    position: relative;
  }
  .card.good { border-color: var(--good); box-shadow: 0 24px 60px -30px rgba(22,163,74,0.35); }
  .card.warn { border-color: var(--warn); box-shadow: 0 24px 60px -30px rgba(217,119,6,0.30); }
  .card.bad  { border-color: var(--bad);  box-shadow: 0 24px 60px -30px rgba(220,38,38,0.30); }

  .tag {
    position: absolute;
    top: 18px; right: 18px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 11px;
    border-radius: 999px;
  }
  .card.good .tag { background: var(--good-bg); color: var(--good); }
  .card.warn .tag { background: var(--warn-bg); color: var(--warn); }
  .card.bad  .tag { background: var(--bad-bg);  color: var(--bad);  }

  .label {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .headline {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }

  .pizza-scene {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .pizza-wrap { width: 180px; height: 180px; }
  .bounce { animation: bounce 2.4s ease-in-out infinite; }
  .shake  { animation: shake 3s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes shake  { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }

  .face { font-size: 40px; }
  .verdict {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .card.good .verdict { color: var(--good); }
  .card.warn .verdict { color: var(--warn); }
  .card.bad  .verdict { color: var(--bad);  }

  .foot {
    background: var(--ink);
    color: #fff;
    border-radius: 18px;
    padding: 22px 30px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .foot .hl {
    background: var(--highlight);
    color: var(--ink);
    padding: 2px 10px;
    border-radius: 6px;
  }

  @media (max-width: 1100px) {
    .frame { aspect-ratio: auto; }
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 42px; }
    .foot { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="frame">

      <div class="head">
        <div class="eyebrow">How Google gets your website</div>
        <h1>SSG vs SSR vs CSR — like ordering <span class="mark">pizza</span>.</h1>
      </div>

      <div class="grid">
        <!-- SSG pizza -->
        <div class="card good">
          <div class="tag">Best</div>
          <div class="label">SSG</div>
          <div class="headline">Pizza already made</div>
          <div class="pizza-scene">
            <div class="pizza-wrap bounce">
              <svg viewBox="0 0 200 200" width="180" height="180" aria-label="Ready pizza">
                <circle cx="100" cy="100" r="92" fill="#e8b66b" stroke="#a0621c" stroke-width="4"/>
                <circle cx="100" cy="100" r="78" fill="#ffd97a"/>
                <circle cx="70"  cy="70"  r="14" fill="#c0392b"/>
                <circle cx="130" cy="70"  r="14" fill="#c0392b"/>
                <circle cx="70"  cy="130" r="14" fill="#c0392b"/>
                <circle cx="130" cy="130" r="14" fill="#c0392b"/>
                <circle cx="100" cy="100" r="14" fill="#c0392b"/>
                <ellipse cx="50"  cy="100" rx="7" ry="4" fill="#2e7d32"/>
                <ellipse cx="150" cy="100" rx="7" ry="4" fill="#2e7d32"/>
                <ellipse cx="100" cy="50"  rx="7" ry="4" fill="#2e7d32"/>
                <ellipse cx="100" cy="150" rx="7" ry="4" fill="#2e7d32"/>
                <path d="M80 20 Q85 10 80 0"   stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
                <path d="M100 20 Q105 10 100 0" stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
                <path d="M120 20 Q125 10 120 0" stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
              </svg>
            </div>
          </div>
          <div class="face">😋</div>
          <div class="verdict">Google is happy</div>
        </div>

        <!-- SSR oven -->
        <div class="card warn">
          <div class="tag">Slow</div>
          <div class="label">SSR</div>
          <div class="headline">Made fresh. Wait.</div>
          <div class="pizza-scene">
            <div class="pizza-wrap">
              <svg viewBox="0 0 200 200" width="180" height="180" aria-label="Pizza in oven">
                <rect x="20" y="50" width="160" height="120" rx="10" fill="#44403c" stroke="#1c1917" stroke-width="3"/>
                <rect x="40" y="70" width="120" height="70" rx="6" fill="#fde68a"/>
                <circle cx="100" cy="105" r="26" fill="#e8b66b" stroke="#a0621c" stroke-width="2"/>
                <circle cx="100" cy="105" r="20" fill="#ffd97a"/>
                <circle cx="92"  cy="100" r="4"  fill="#c0392b"/>
                <circle cx="108" cy="100" r="4"  fill="#c0392b"/>
                <circle cx="100" cy="112" r="4"  fill="#c0392b"/>
                <rect x="40" y="152" width="120" height="8" rx="4" fill="#78716c"/>
                <circle cx="55"  cy="170" r="5" fill="#a8a29e"/>
                <circle cx="145" cy="170" r="5" fill="#a8a29e"/>
                <path d="M70 60 Q75 50 70 40" stroke="#d97706" stroke-width="3" fill="none" stroke-linecap="round">
                  <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
                </path>
                <path d="M100 60 Q105 50 100 40" stroke="#d97706" stroke-width="3" fill="none" stroke-linecap="round">
                  <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
                </path>
                <path d="M130 60 Q135 50 130 40" stroke="#d97706" stroke-width="3" fill="none" stroke-linecap="round">
                  <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
                </path>
              </svg>
            </div>
          </div>
          <div class="face">⏳</div>
          <div class="verdict">Google is waiting</div>
        </div>

        <!-- CSR flour -->
        <div class="card bad">
          <div class="tag">Nope</div>
          <div class="label">CSR</div>
          <div class="headline">Make it yourself</div>
          <div class="pizza-scene">
            <div class="pizza-wrap shake">
              <svg viewBox="0 0 200 200" width="180" height="180" aria-label="Flour bag">
                <path d="M50 60 L50 180 Q50 185 55 185 L145 185 Q150 185 150 180 L150 60 Q150 55 145 55 L125 55 L125 40 Q125 35 120 35 L80 35 Q75 35 75 40 L75 55 L55 55 Q50 55 50 60 Z"
                      fill="#f5f5f4" stroke="#1c1917" stroke-width="3"/>
                <rect x="65" y="90" width="70" height="40" rx="4" fill="#0a0a0a"/>
                <text x="100" y="115" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-weight="800" font-size="18">FLOUR</text>
                <circle cx="60" cy="40" r="6" fill="#f5f5f4" opacity="0.8"/>
                <circle cx="140" cy="45" r="5" fill="#f5f5f4" opacity="0.8"/>
                <circle cx="100" cy="25" r="7" fill="#f5f5f4" opacity="0.8"/>
                <text x="165" y="80" text-anchor="middle" fill="#dc2626" font-family="Inter, sans-serif" font-weight="900" font-size="48">?</text>
              </svg>
            </div>
          </div>
          <div class="face">😠</div>
          <div class="verdict">Google leaves</div>
        </div>
      </div>

      <div class="foot">
        Google is hungry. Give it a <span class="hl">ready pizza</span>.
      </div>

    </div>
  </div>
</body>
</html>
